name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend — pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: scaffold
        run: pip install -r requirements.txt

      - name: Run pytest
        working-directory: scaffold
        run: pytest tests/ -v

  frontend-tests:
    name: Frontend — vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scaffold/frontend/package-lock.json

      - name: Install dependencies
        working-directory: scaffold/frontend
        run: npm install

      - name: Run vitest
        working-directory: scaffold/frontend
        run: npm test
